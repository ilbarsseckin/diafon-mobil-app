name: diafon_mobil_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  provider: ^6.1.5+1
  geolocator: ^14.0.3
  google_maps_flutter: ^2.17.1
  permission_handler: ^12.0.3
  flutter_webrtc: ^1.5.1
  socket_io_client: ^3.1.6
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0
  flutter_callkit_incoming: ^3.1.2
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.2
  qr_flutter: ^4.1.0
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^22.0.1
  webview_flutter: ^4.7.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

# ============================================================
# Native acilis ekrani (Flutter logosu yerine MD amblemi)
# Uretmek icin: dart run flutter_native_splash:create
# ============================================================
flutter_native_splash:
  color: "#0A2342"
  image: assets/logo.png
  android: true
  ios: true
  android_12:
    color: "#0A2342"
    image: assets/logo.png